<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minhas Tarefas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#3e76fe",
              "secondary": "#585f6d",
              "surface-container-highest": "#dbe4e7",
              "on-secondary": "#f8f8ff",
              "surface-bright": "#f8f9fa",
              "on-primary-fixed-variant": "#525c6d",
              "surface": "#f8f9fa",
              "error-container": "#fe8983",
              "on-error": "#fff7f6",
              "on-secondary-container": "#4b525f",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed": "#ffffff",
              "secondary-fixed": "#dce2f3",
              "on-primary-fixed": "#364050",
              "on-background": "#2b3437",
              "error-dim": "#4e0309",
              "primary-fixed-dim": "#cbd5e9",
              "on-primary-container": "#485263",
              "surface-variant": "#dbe4e7",
              "on-secondary-fixed": "#39404c",
              "surface-container": "#eaeff1",
              "on-primary": "#f6f7ff",
              "on-surface-variant": "#586064",
              "surface-container-high": "#e2e9ec",
              "inverse-on-surface": "#9b9d9e",
              "inverse-surface": "#0c0f10",
              "outline-variant": "#abb3b7",
              "surface-tint": "#555f70",
              "tertiary-container": "#3e76fe",
              "primary-container": "#d9e3f7",
              "surface-dim": "#d1dce0",
              "inverse-primary": "#d3ddf2",
              "primary-fixed": "#d9e3f7",
              "on-surface": "#2b3437",
              "background": "#f8f9fa",
              "on-secondary-fixed-variant": "#555c69",
              "primary-dim": "#495364",
              "tertiary-fixed-dim": "#2d68f0",
              "on-tertiary-fixed-variant": "#f9f7ff",
              "surface-container-low": "#f1f4f6",
              "secondary-fixed-dim": "#ced4e4",
              "tertiary-dim": "#0049c2",
              "tertiary": "#0053dc",
              "outline": "#737c7f",
              "error": "#9f403d",
              "on-error-container": "#752121",
              "on-tertiary": "#faf8ff",
              "secondary-container": "#dce2f3",
              "on-tertiary-container": "#000000",
              "primary": "#555f70",
              "secondary-dim": "#4c5361"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #2b3437;
        }
        .editorial-shadow {
            box-shadow: 0px 8px 32px rgba(43, 52, 55, 0.04);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- TopAppBar from JSON -->
<header class="sticky top-0 flex justify-between items-center w-full px-6 py-4 max-w-3xl mx-auto bg-slate-50/80 backdrop-blur-xl z-50">
<h1 class="text-xl font-bold tracking-tight text-slate-900">Atelier Tasks</h1>
<div class="flex items-center gap-4">
<button class="hover:bg-slate-200/50 transition-colors duration-200 p-2 rounded-full scale-95 active:opacity-80 transition-all">
<span class="material-symbols-outlined text-slate-500">settings</span>
</button>
<button class="hover:bg-slate-200/50 transition-colors duration-200 p-2 rounded-full scale-95 active:opacity-80 transition-all">
<span class="material-symbols-outlined text-slate-500">account_circle</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-12 pb-32">
<!-- Today's Overview Anchor -->
<section class="mb-12">
<p class="text-sm font-medium text-tertiary-fixed font-label tracking-widest uppercase mb-2">Espaço de Trabalho</p>
<h2 class="text-4xl font-extrabold font-headline tracking-tight text-on-background">Foco no hoje.</h2>
</section>
<!-- New Task Input Section -->
<section class="mb-10 group">
<div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-4 transition-all duration-300 focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-tertiary/10">
<span class="material-symbols-outlined text-outline">add_circle</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-lg font-body placeholder:text-outline-variant text-on-surface" placeholder="Nova tarefa" type="text"/>
<button class="bg-tertiary text-on-tertiary px-6 py-2.5 rounded-full font-semibold text-sm hover:opacity-90 active:scale-95 transition-all">Adicionar</button>
</div>
</section>
<!-- Filter Bar & Meta -->
<section class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
<nav class="flex gap-2">
<button class="px-5 py-2 rounded-full bg-surface-container-high text-on-surface text-sm font-semibold transition-colors hover:bg-surface-container-highest">Todas</button>
<button class="px-5 py-2 rounded-full bg-tertiary text-on-tertiary text-sm font-semibold shadow-lg shadow-tertiary/10">Pendentes</button>
<button class="px-5 py-2 rounded-full bg-surface-container-high text-on-surface text-sm font-semibold transition-colors hover:bg-surface-container-highest">Concluídas</button>
</nav>
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="text-xs font-bold uppercase tracking-widest font-label">3 ITENS RESTANTES</span>
</div>
</section>
<!-- Task List Area -->
<div class="space-y-4">
<!-- Pending Task Item -->
<div class="group bg-surface-container-lowest p-5 rounded-xl editorial-shadow flex items-start gap-4 transition-all hover:bg-surface-bright">
<div class="mt-1">
<button class="w-6 h-6 rounded-md border-2 border-outline-variant flex items-center justify-center hover:border-tertiary transition-colors">
<!-- Unchecked -->
</button>
</div>
<div class="flex-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-body text-base leading-relaxed" type="text" value="Refine the typography system for the project"/>
<p class="text-xs text-on-surface-variant mt-1">Hoje • Design</p>
</div>
<button class="opacity-0 group-hover:opacity-100 p-2 text-outline hover:text-error transition-all">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Pending Task Item -->
<div class="group bg-surface-container-lowest p-5 rounded-xl editorial-shadow flex items-start gap-4 transition-all hover:bg-surface-bright">
<div class="mt-1">
<button class="w-6 h-6 rounded-md border-2 border-outline-variant flex items-center justify-center hover:border-tertiary transition-colors">
</button>
</div>
<div class="flex-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-body text-base leading-relaxed" type="text" value="Review contract with the new editorial client"/>
<p class="text-xs text-on-surface-variant mt-1">Amanhã • Jurídico</p>
</div>
<button class="opacity-0 group-hover:opacity-100 p-2 text-outline hover:text-error transition-all">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Completed Task Item -->
<div class="group bg-surface-container-low/50 p-5 rounded-xl flex items-start gap-4 transition-all grayscale-[0.5] opacity-60">
<div class="mt-1">
<button class="w-6 h-6 rounded-md bg-primary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-on-primary text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
</div>
<div class="flex-1">
<p class="line-through text-on-surface-variant font-body text-base leading-relaxed">Prepare the atelier moodboard</p>
<p class="text-xs text-outline-variant mt-1">Concluído • Criativo</p>
</div>
<button class="opacity-0 group-hover:opacity-100 p-2 text-outline hover:text-error transition-all">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Empty State / Add Suggestion Card -->
<div class="border-2 border-dashed border-surface-container-highest rounded-xl p-8 flex flex-col items-center justify-center text-center opacity-50 hover:opacity-80 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-3xl mb-2 text-outline">lightbulb</span>
<p class="text-sm font-body">Não se esqueça de agendar sua sessão de foco.</p>
</div>
</div>
</main>
<!-- BottomNavBar from JSON -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-3 bg-white/80 backdrop-blur-2xl shadow-[0_-8px_32px_rgba(43,52,55,0.04)] rounded-t-3xl border-t border-slate-100/10 md:hidden">
<a class="flex flex-col items-center justify-center text-blue-600 bg-blue-50/50 rounded-xl px-4 py-2 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest mt-1">Tasks</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-slate-900 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined">wb_sunny</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest mt-1">Focus</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-slate-900 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px] font-medium font-inter uppercase tracking-widest mt-1">Archive</span>
</a>
</nav>
</body></html>
